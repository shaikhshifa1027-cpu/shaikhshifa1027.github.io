<!DOCTYPE html>
<html>
<head>
<title>Consumer Enquiry</title>
<link rel="stylesheet" href="style.css">

<script>

function submitForm(){

var name=document.getElementById("name").value;
var email=document.getElementById("email").value;
var country=document.getElementById("country").value;

if(name=="" || email=="" || country=="")
{
alert("Please fill all fields.");
return false;
}

alert("Thank you "+name+"! Your enquiry has been received.");

}

</script>

</head>

<body>

<header>
<h1>Consumer Enquiry Form</h1>
</header>

<nav>
<a href="index.html">Home</a>
<a href="dishes.html">Famous Dishes</a>
<a href="ingredients.html">Ingredients</a>
<a href="origin.html">Dish Origins</a>
<a href="enquiry.html">Consumer Enquiry</a>
</nav>

<div class="container">

<h2>Ask for Information</h2>

<form onsubmit="submitForm(); return false;">

<label>Name</label>
<input type="text" id="name">

<label>Email</label>
<input type="email" id="email">

<label>Country</label>
<input type="text" id="country">

<label>Favorite Dish</label>
<input type="text">

<label>Message</label>
<textarea rows="5"></textarea>

<button type="submit">Submit</button>

</form>

</div>

<footer>
<p>Food Around the World</p>
</footer>

</body>
</html>
